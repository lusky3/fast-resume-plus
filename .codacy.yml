---
# Codacy configuration — https://docs.codacy.com/repositories-configure/codacy-configuration-file/

# Exclude test files from Bandit's B101 assert check.
# pytest requires assert statements — flagging them as security issues is a
# well-known false positive. The pyproject.toml [tool.bandit] skips = ["B101"]
# covers direct Bandit invocations; this file covers Codacy's own scanner.
exclude_paths:
  - "tests/**"
