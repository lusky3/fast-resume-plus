name: Greptile Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    name: AI code review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Greptile review
        uses: greptile-systems/greptile-review@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          greptile-token: ${{ secrets.GREPTILE_TOKEN }}
